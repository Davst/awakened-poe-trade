publish:
  - provider: "github"
    owner: "Davst"
    repo: "awakened-poe-trade"
productName: "Awakened PoE Trade"
npmRebuild: false
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js"]
  - from: "../renderer/dist"
    to: "."
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  icon: "build/icons/icon.ico"
  target:
  - "nsis"
  - "portable"
  forceCodeSigning: false
linux:
  target:
  - "AppImage"
mac:
  target:
  - target: "dmg"
    arch:
    - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
  - "--sandbox"
